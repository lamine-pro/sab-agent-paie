services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:latest
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    # AJOUT : Permet de vérifier si Postgres est réellement prêt
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  iceberg-catalog:
    image: tabulario/iceberg-rest:latest
    container_name: iceberg-catalog
    ports:
      - "8181:8181"
    environment:
      - CATALOG_CATALOG__IMPL=org.apache.iceberg.jdbc.JdbcCatalog
      # MODIFIÉ : postgres au lieu de postgres-server pour correspondre au container_name
      - CATALOG_URI=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - CATALOG_JDBC_USER=${POSTGRES_USER}
      - CATALOG_JDBC_PASSWORD=${POSTGRES_PASSWORD}
      - CATALOG_WAREHOUSE=s3://warehouse/
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER} # Réutilisons tes variables d'environnement
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=us-east-1
      - CATALOG_S3_ENDPOINT=http://minio:9000
      - CATALOG_S3_PATH__STYLE__ACCESS=true
    depends_on:
      minio:
        condition: service_healthy # MODIFIÉ : Attend que le healthcheck de MinIO soit au vert
      postgres:
        condition: service_healthy # MODIFIÉ : Attend que le healthcheck de Postgres soit au vert
    
  
  trino:
    image: trinodb/trino:latest
    ports:
      - "8080:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog
    depends_on:
      - minio
      - postgres
      - iceberg-catalog

volumes:
  minio-data: